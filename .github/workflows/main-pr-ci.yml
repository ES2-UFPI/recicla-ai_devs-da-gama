name: CI/CD - Pull Request para Main (Release)

on:
  pull_request:
    branches:
      - main

jobs:
  backend-ci:
    name: Backend - Build, Testes e Docker
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./backend
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx
      
      - name: Verificar sintaxe Python
        run: |
          python -m py_compile server.py
          find src -name "*.py" -exec python -m py_compile {} \;
      
      - name: Rodar testes
        run: |
          if [ -d "tests" ]; then
            pytest tests/ -v --tb=short
          else
            echo "⚠️  Nenhum teste encontrado. Considere adicionar testes antes do merge para main."
            exit 1
          fi
        continue-on-error: false
      
      - name: Build da imagem Docker (Backend)
        run: |
          docker build -t reciclaai-backend:test .

  frontend-ci:
    name: Frontend - Build e Docker
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Instalar dependências
        run: npm ci
      
      - name: Build do projeto
        run: npm run build
      
      - name: Build da imagem Docker (Frontend)
        run: |
          docker build -t reciclaai-frontend:test .

  docker-compose-validation:
    name: Validação Docker Compose Completo
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Criar arquivo .env de teste para backend
        run: |
          cat > backend/.env << EOF
          MONGODB_URI=mongodb://mongodb:27017
          DATABASE_NAME=reciclaai_test
          SECRET_KEY=test_secret_key_for_ci
          ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=30
          EOF
      
      - name: Validar configuração do docker-compose
        run: docker compose config
      
      - name: Build de todos os serviços
        run: docker compose build
      
      - name: Subir serviços para verificação
        run: |
          docker compose up -d
          sleep 10
      
      - name: Verificar saúde dos containers
        run: |
          docker compose ps
          docker compose logs backend
          docker compose logs frontend
      
      - name: Cleanup
        if: always()
        run: docker compose down -v

  release-ready-check:
    name: ✅ Pronto para Release
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci, docker-compose-validation]
    
    steps:
      - name: Verificação final
        run: |
          echo "🎉 ============================================="
          echo "✅ Todos os checks de CI/CD passaram!"
          echo "📦 Backend: Build e Docker OK"
          echo "🎨 Frontend: Build, Lint e Docker OK"
          echo "🐳 Docker Compose: Validado com sucesso"
          echo "🚀 Branch pronta para merge na main (release)"
          echo "============================================="
